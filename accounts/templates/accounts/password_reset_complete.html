{% extends 'base.html' %}

{% block content %}
<!-- Заголовок -->
<section class="hero-section text-center">
    <div class="container">
        <h1 class="display-4 fw-bold mb-4">Пароль сброшен</h1>
        <p class="lead">Вы успешно сбросили пароль</p>
    </div>
</section>

<!-- Сообщение о завершении сброса пароля -->
<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                    </div>
                    
                    <h2 class="mb-4">Пароль успешно сброшен</h2>
                    
                    <p class="lead mb-4">Вы можете войти в систему с новым паролем.</p>
                    
                    <div class="mt-5">
                        <a href="{% url 'accounts:login' %}" class="btn btn-primary px-4">Войти в систему</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
